<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>सहयोग सूत्र मिशन - सदस्य पंजीकरण</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #007bff; /* modern blue */
            --secondary-color: #28a745; /* successful green */
            --text-color: #333;
            --bg-color: #f4f7f6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: #fff;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        .header {
            margin-bottom: 30px;
        }

        .main-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .sub-title {
            font-size: 16px;
            color: #666;
            font-weight: 400;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
            color: #555;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e1e1;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background-color: var(--secondary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background-color: #218838;
        }

        /* Responsive adjustments */
        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }
            .main-title {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 class="main-title">सहयोग सूत्र मिशन</h1>
        <p class="sub-title">सदस्य पंजीकरण फॉर्म</p>
    </div>

    <form id="registrationForm">
        <div class="form-group">
            <label for="activationPin">एक्टिवेशन पिन (₹21)</label>
            <input type="number" id="activationPin" name="activationPin" placeholder="अपना पिन दर्ज करें" required>
        </div>

        <div class="form-group">
            <label for="fullName">आपका पूरा नाम</label>
            <input type="text" id="fullName" name="fullName" placeholder="जैसे: राहुल कुमार" required>
        </div>

        <div class="form-group">
            <label for="mobileNumber">मोबाइल नंबर</label>
            <input type="tel" id="mobileNumber" name="mobileNumber" placeholder="10 अंकों का नंबर" pattern="[0-9]{10}" required>
        </div>

        <button type="submit" class="submit-btn">मिशन से जुड़ें</button>
    </form>
</div>

</body>
</html>
