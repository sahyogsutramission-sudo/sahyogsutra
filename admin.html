<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin | Sahyog Sutra</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Poppins', sans-serif; }
        body { background: #f0f2f5; padding: 20px; }
        
        /* Login Overlay */
        #adminAuth { position: fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:9999; display: flex; justify-content: center; align-items: center; }
        .auth-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 350px; }
        
        /* Dashboard Layout */
        #dashboard { display: none; max-width: 900px; margin: auto; }
        .card { background: white; padding: 25px; border-radius: 15px; margin-bottom: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h2 { color: #1a73e8; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        .btn { background: #28a745; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: left; font-size: 14px; }
        th { background: #f8f9fa; color: #555; }
        .status-used { color: #dc3545; font-weight: bold; }
        .status-new { color: #28a745; font-weight: bold; }
    </style>
</head>
<body>

<div id="adminAuth">
    <div class="auth-card">
        <i class="fas fa-user-shield fa-3x" style="color:#1a73e8; margin-bottom:15px;"></i>
        <h2>Admin Login</h2>
        <input type="password" id="adminPass" placeholder="Enter Admin Password">
        <button class="btn" onclick="checkAuth()">Login Dashboard</button>
    </div>
</div>

<div id="dashboard">
    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h1>Sahyog Admin Dashboard</h1>
        <button onclick="location.reload()" style="background:#666; color:white; border:none; padding:5px 15px; border-radius:5px;">Logout</button>
    </div>

    <div class="card">
        <h2><i class="fas fa-plus-circle"></i> Create New ₹21 PIN</h2>
        <div style="display:flex; gap:10px;">
            <input type="number" id="pinInput" placeholder="Enter 6-digit PIN">
            <button class="btn" style="width:auto;" onclick="makePin()">Create</button>
        </div>
    </div>

    <div class="card">
        <h2><i class="fas fa-users"></i> Registered Members</h2>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Name</th>
                        <th>Mobile</th>
                        <th>PIN</th>
                    </tr>
                </thead>
                <tbody id="memberList"></tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    // 1. Firebase Config (Paste your actual details here)
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        databaseURL: "YOUR_DATABASE_URL",
        projectId: "YOUR_PROJECT_ID",
        appId: "YOUR_APP_ID"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 2. Authentication Logic
    function checkAuth() {
        const pass = document.getElementById('adminPass').value;
        // यहाँ अपना मनपसंद पासवर्ड सेट करें (जैसे: 1234)
        if(pass === "9458") { 
            document.getElementById('adminAuth').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            loadData();
        } else {
            alert("Incorrect Admin Password!");
        }
    }

    // 3. Create PIN Logic
    function makePin() {
        const pin = document.getElementById('pinInput').value;
        if(pin.length < 4) return alert("Valid PIN enter karein");
        
        db.ref('pins/' + pin).set({ pin: pin, used: false })
        .then(() => {
            alert("PIN " + pin + " Created Successfully!");
            document.getElementById('pinInput').value = "";
        });
    }

    // 4. Load Data Logic
    function loadData() {
        db.ref('users').on('value', (snap) => {
            let html = "";
            snap.forEach((child) => {
                const user = child.val();
                html += `<tr>
                    <td>${user.regDate || 'N/A'}</td>
                    <td>${user.name}</td>
                    <td>${user.mobile}</td>
                    <td>${user.pin}</td>
                </tr>`;
            });
            document.getElementById('memberList').innerHTML = html;
        });
    }
</script>
</body>
</html>
